<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Product Landing Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <header id="header">
    <img id="header-img" src="https://cdn.freecodecamp.org/testable-projects-fcc/images/product-landing-page-logo.png" alt="Product Logo">
    <nav id="nav-bar">
      <ul>
        <li><a href="#features" class="nav-link">Features</a></li>
        <li><a href="#how-it-works" class="nav-link">How It Works</a></li>
        <li><a href="#pricing" class="nav-link">Pricing</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero Section -->
  <section id="hero">
    <h1>Handcrafted, Home-Made Masterpieces</h1>
    <form id="form" action="https://www.freecodecamp.org/email-submit" method="POST">
      <input type="email" id="email" name="email" placeholder="Enter your email" required>
      <input type="submit" id="submit" value="Submit">
    </form>
  </section>

  <!-- Embedded Video -->
  <section id="video-section">
    <iframe id="video" width="560" height="315" src="https://www.youtube.com/embed/8-fkvWFSeYc" 
      title="Product Video" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen>
    </iframe>
  </section>

  <!-- Features Section -->
  <section id="features">
    <h2>Features</h2>
    <p>Our product is handcrafted, precise, and beautiful.</p>
  </section>

  <!-- How It Works Section -->
  <section id="how-it-works">
    <h2>How It Works</h2>
    <p>Step by step guide to using our product efficiently.</p>
  </section>

  <!-- Pricing Section -->
  <section id="pricing">
    <h2>Pricing</h2>
    <p>Affordable pricing plans for everyone.</p>
  </section>

</body>
</html>

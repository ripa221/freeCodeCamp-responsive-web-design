<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Application Form</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <h1>Job Application Form</h1>

  <form>

    <!-- Name -->
    <label for="name">Full Name:</label>
    <input type="text" id="name" required placeholder="Enter your name">

    <!-- Email -->
    <label for="email">Email:</label>
    <input type="email" id="email" required placeholder="Enter your email">

    <!-- Position -->
    <label for="position">Position:</label>
    <select id="position" required>
      <option value="">Select a position</option>
      <option>Frontend Developer</option>
      <option>Backend Developer</option>
      <option>Designer</option>
    </select>

    <!-- Radio Group -->
    <fieldset class="radio-group">
      <legend>Availability:</legend>

      <input type="radio" id="full" name="availability" checked>
      <label for="full">Full-Time</label>

      <input type="radio" id="part" name="availability">
      <label for="part">Part-Time</label>

    </fieldset>

    <!-- Message -->
    <label for="message">Why do you want this job?</label>
    <textarea id="message" required placeholder="Write your motivation"></textarea>

    <!-- Submit -->
    <button type="submit">Submit Application</button>

  </form>

</div>

</body>
</html>

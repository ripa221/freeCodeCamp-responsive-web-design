<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>নিচে স্ক্রল করে দেখো CSS position কিভাবে কাজ করে</h2>
    <!-- sticky -->
<div class="sticky-box">
Sticky Box (স্ক্রল করলে উপরে লেগে থাকবে)
</div>

<div class="spacer"></div>

<!-- absolute -->
<div class="container">
  Container (position: relative)
  <div class="absolute-box">
    Absolute Box (container এর ভিতরে position)
  </div>
</div>

<div class="spacer"></div>

<!-- fixed -->
<div class="fixed-box">
Fixed Box (সবসময় স্ক্রিনে থাকবে)
</div>

<div class="card">
  Message
  <span class="badge">3</span>
</div>
<div class="icon">
  🔔
  <span class="badge">3</span>
</div>

<div class="container">
  <div class="box1">Box 1</div>
  <div class="box2">Box 2</div>
  <div class="box3">Box 3</div>
</div>
</body>
</html>

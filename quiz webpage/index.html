<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quiz Webpage">
    <title>Build a Quiz Webpage</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <img src="https://cdn.freecodecamp.org/platform/universal/fcc_primary.svg" alt="freeCodeCamp" id="logo">
        <h1>HTML/CSS Quiz</h1>
        <nav>
            <ul>
                <li><a href="#student-info">INFO</a></li>
                <li><a href="#html-questions">HTML</a></li>
                <li><a href="#css-questions">CSS</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <form action="https://freecodecamp.org/practice-project/accessibility-quiz" method="post">
            <section role="region" aria-labelledby="student-info">
                <h2 id="student-info">Student Info</h2>
                <div class="info"><label for="student-name" placeholder="Habibur">Name: </label><input type="text"
                        id="student-name" name="name" required></div>
                <div class="info"><label for="email">Email: </label><input type="email" id="email" name="email" required
                        placeholder="abid@.com"></div>
                <div class="info"><label for="date-of-birth">Date-of-Birth: </label><input type="date"
                        id="date-of-birth" required placeholder="07/12/26" name="date-of-birth"></div>
            </section>
            <section role="region" aria-labelledby="html-questions">
                <h2 id="html-questions">HTML Questions</h2>
                <div class="question-block">
                    <h3><span class="sr-only">Question </span>1</h3>
                    <fieldset class="question" name="html-question-one">
                        <legend>HTML stands for Hyper Text Markup Language. (True/False)</legend>
                        <ul class="answers-list">
                            <li>
                                <label for="q1-a1">
                                    <input type="radio" name="question1" value="true" id="q1-a1">
                                    True
                                </label>
                            </li>
                            <li>
                                <label for="q1-a2">
                                    <input type="radio" name="question1" value="false" id="q1-a2">
                                    False
                                </label>
                            </li>
                        </ul>

                    </fieldset>
                </div>
                <div class="question-block">

                    <h3><span class="sr-only">Question </span>2</h3>
                    <fieldset class="question" name="html-question-one">
                        <legend>The

                            <head> element contains visible content on the webpage. (True/False)
                        </legend>
                        <ul class="answers-list">
                            <li>
                                <label for="q2-a1">
                                    <input type="radio" name="question2" value="true" id="q2-a1">
                                    True
                                </label>
                            </li>
                            <li>
                                <label for="q2-a2">
                                    <input type="radio" name="question2" value="false" id="q2-a2">
                                    False
                                </label>
                            </li>
                        </ul>
                    </fieldset>
                </div>
            </section>
            <section role="region" aria-labelledby="css-questions">
                <h2 id="css-questions">CSS Questions</h2>
                <div class="formrow">
                    <!-- Question-block with label linked to select -->
                    <div class="question-block">
                        <label for="css-choice">Do you like using CSS for styling web pages?</label>
                    </div>

                    <!-- Answer div with select element -->
                    <div class="answer">
                        <select id="css-choice" name="css-choice" required>
                            <option value="">Select an option</option>
                            <option value="yes">Yes</option>
                            <option value="no">No</option>
                        </select>
                    </div>

                    <!-- Second question-block and answer -->
                    <div class="question-block">
                        <label for="additional-comments">Enter your favorite CSS property:</label>
                    </div>
                    <div class="answer">
                        <input type="text" id="favorite-property" name="favorite-property"
                            placeholder="Your answer here">
                           <textarea id="additional-comments" name="additional-comments" rows="4" cols="50" placeholder="Type your comments here..."></textarea>
                    </div>
                </div>
            </section>

    <button type="submit">Send</button>

        </form>
    </main>
<footer>
    <address><a href="https://freecodecamp.org">freeCodeCamp</a><br />
San Francisco<br />
California<br />
USA</address>
</footer>

</body>

</html>
